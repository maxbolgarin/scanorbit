version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - noctx
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
    - wastedassign
    - whitespace

  settings:
    dupl:
      threshold: 200
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (github.com/rs/zerolog.Event).Msg
        - (github.com/rs/zerolog.Event).Msgf
        - fmt.Fprintf
        - fmt.Fprintln
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks: []
    gosec:
      excludes:
        - G104
        - G304
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    prealloc:
      simple: true
      for-loops: true
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: unreachable-code
        - name: unused-parameter

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - dupl
          - errcheck
          - gocritic
          - gosec

formatters:
  enable:
    - gofmt
    - goimports

output:
  formats:
    colored-line-number: {}
  sort-results: true
