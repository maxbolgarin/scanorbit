# ScanOrbit — production self-host using pre-built images from GHCR.
#
# Use this file if you DON'T want to clone the repo and build locally.
# Just grab this file plus .env.example, configure, and run:
#
#   curl -fsSL https://raw.githubusercontent.com/maxbolgarin/scanorbit/main/docker-compose.registry.yml -o compose.yml
#   curl -fsSL https://raw.githubusercontent.com/maxbolgarin/scanorbit/main/.env.example -o .env
#   # edit .env — generate the four secrets, set FRONTEND_URL, etc.
#   docker compose up -d
#
# Pin a specific version with `SCANORBIT_VERSION=1.4.2 docker compose up -d`
# (defaults to `latest`). Major and minor tags are also published — see
# https://github.com/maxbolgarin/scanorbit/pkgs/container/scanorbit-api
#
# All services share an internal network. Only the web app (port 8080) is
# exposed to the host by default — point a reverse proxy at it for production.

services:
  db:
    image: postgres:17-alpine
    container_name: scanorbit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scanorbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanorbit}
      POSTGRES_DB: ${POSTGRES_DB:-scanorbit}
    # Bind only to localhost on the host. Comment this out if your reverse
    # proxy or workers run elsewhere and you want to lock the DB inside the
    # docker network only.
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanorbit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: scanorbit-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ghcr.io/maxbolgarin/scanorbit-api:${SCANORBIT_VERSION:-latest}
    container_name: scanorbit-migrate
    pull_policy: always
    command: ["node", "dist/db/migrate.js"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scanorbit}:${POSTGRES_PASSWORD:-scanorbit}@db:5432/${POSTGRES_DB:-scanorbit}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    image: ghcr.io/maxbolgarin/scanorbit-api:${SCANORBIT_VERSION:-latest}
    container_name: scanorbit-api
    pull_policy: always
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-scanorbit}:${POSTGRES_PASSWORD:-scanorbit}@db:5432/${POSTGRES_DB:-scanorbit}
      REDIS_URL: redis://redis:6379
      # Required: generate each with `openssl rand -hex 32`.
      # The API process refuses to start in production mode if any are unset.
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-}
      OAUTH_ENCRYPTION_KEY: ${OAUTH_ENCRYPTION_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      # Single-user mode by default. Set AUTH_ENABLED=true in .env to require
      # real login. Never set false on a publicly reachable deployment.
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Optional: Resend for transactional email. When unset, verification codes
      # are printed to the API container logs (run `docker compose logs -f api`).
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-ScanOrbit <noreply@localhost>}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  app:
    image: ghcr.io/maxbolgarin/scanorbit-app:${SCANORBIT_VERSION:-latest}
    container_name: scanorbit-app
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - api

  scanner:
    image: ghcr.io/maxbolgarin/scanorbit-scanner:${SCANORBIT_VERSION:-latest}
    container_name: scanorbit-scanner
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scanorbit}:${POSTGRES_PASSWORD:-scanorbit}@db:5432/${POSTGRES_DB:-scanorbit}?sslmode=disable
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SCAN_CONCURRENCY: ${SCAN_CONCURRENCY:-10}
      SCAN_TIMEOUT_MINUTES: ${SCAN_TIMEOUT_MINUTES:-60}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      OAUTH_ENCRYPTION_KEY: ${OAUTH_ENCRYPTION_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  analyzer:
    image: ghcr.io/maxbolgarin/scanorbit-analyzer:${SCANORBIT_VERSION:-latest}
    container_name: scanorbit-analyzer
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scanorbit}:${POSTGRES_PASSWORD:-scanorbit}@db:5432/${POSTGRES_DB:-scanorbit}?sslmode=disable
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OAUTH_ENCRYPTION_KEY: ${OAUTH_ENCRYPTION_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
