services:
  proxy:
    image: caddy:2-alpine
    container_name: scanorbit-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - landing
      - app
    restart: always

  landing:
    build:
      context: ./apps/landing
      dockerfile: Dockerfile
    container_name: scanorbit-landing
    restart: always

  app:
    build:
      context: ./apps/app
      dockerfile: Dockerfile
    container_name: scanorbit-app
    restart: always

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: scanorbit-api
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  scanner:
    build:
      context: ./workers
      dockerfile: Dockerfile
      target: scanner
    container_name: scanorbit-scanner
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  analyzer:
    build:
      context: ./workers
      dockerfile: Dockerfile
      target: analyzer
    container_name: scanorbit-analyzer
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  db:
    image: postgres:17-alpine
    container_name: scanorbit-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: scanorbit-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
