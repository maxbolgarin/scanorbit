#cloud-config

# =============================================================================
# CI Runner / Jump Host Cloud-Init
# =============================================================================
# Features:
# - Non-root deploy user with sudo access
# - SSH key-only authentication (password disabled)
# - Root login disabled
# - fail2ban for brute-force protection
# - Automatic security updates
# - UFW firewall (SSH only)
# - Docker for CI builds
# - GitHub Actions self-hosted runners
# =============================================================================

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - make
  - jq
  - fail2ban
  - unattended-upgrades
  - apt-listchanges

# Create non-root user for deployments and runner management
users:
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
%{ for key in ssh_public_keys ~}
      - ${key}
%{ endfor ~}

write_files:
  # SSH hardening configuration (identical to app VM)
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      # Disable root login
      PermitRootLogin no

      # Disable password authentication (key-only)
      PasswordAuthentication no
      ChallengeResponseAuthentication no
      UsePAM yes

      # Only allow deploy user
      AllowUsers deploy

      # Security settings
      X11Forwarding no
      MaxAuthTries 3
      ClientAliveInterval 300
      ClientAliveCountMax 2

      # Use strong ciphers
      Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
      MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
      KexAlgorithms curve25519-sha256@libssh.org,diffie-hellman-group16-sha512

  # fail2ban jail configuration
  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 1h
      findtime = 10m
      maxretry = 3
      backend = systemd

      [sshd]
      enabled = true
      port = 22
      filter = sshd
      maxretry = 3
      bantime = 1h

  # Unattended upgrades configuration
  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "$${distro_id}:$${distro_codename}";
          "$${distro_id}:$${distro_codename}-security";
          "$${distro_id}ESMApps:$${distro_codename}-apps-security";
          "$${distro_id}ESM:$${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Package-Blacklist {
      };
      Unattended-Upgrade::DevRelease "auto";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::Automatic-Reboot-Time "03:00";

  # Enable automatic updates
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # Docker daemon configuration
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }

  # GitHub Actions runner setup script
  - path: /opt/setup-runners.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      # sudo -u deploy drops your shell env; pass the PAT explicitly, e.g.:
      #   sudo -u deploy env GITHUB_PAT="$GITHUB_PAT" /opt/setup-runners.sh

      RUNNER_VERSION="2.322.0"
      RUNNER_ARCH="linux-x64"
      RUNNER_USER="deploy"
      RUNNER_HOME="/home/$RUNNER_USER"
      # Prefer env (e.g. rotated PAT) over token baked at instance creation; Terraform $$ → literal $
      GITHUB_PAT="$${GITHUB_PAT:-${github_runner_token}}"
      if [ -z "$GITHUB_PAT" ]; then
        echo "ERROR: GITHUB_PAT is empty. Export GITHUB_PAT or set TF_VAR_github_runner_token when applying Terraform." >&2
        echo 'If you used sudo -u deploy, pass the var: sudo -u deploy env GITHUB_PAT="$GITHUB_PAT" /opt/setup-runners.sh' >&2
        exit 1
      fi
      RUNNER_LABELS="${runner_labels}"
      RUNNER_COUNT=${runner_count}

      # Repos to register runners for (space-separated)
      REPOS="${join(" ", github_runner_repos)}"

      for REPO in $REPOS; do
        REPO_SHORT=$(echo "$REPO" | cut -d'/' -f2)

        # Get registration token from GitHub API
        REG_JSON=$(curl -sS -X POST \
          -H "Authorization: Bearer $GITHUB_PAT" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/$REPO/actions/runners/registration-token")
        REG_TOKEN=$(echo "$REG_JSON" | jq -r .token)

        if [ -z "$REG_TOKEN" ] || [ "$REG_TOKEN" = "null" ]; then
          echo "ERROR: Failed to get registration token for $REPO" >&2
          echo "GitHub API response: $REG_JSON" >&2
          echo "GITHUB_PAT length (0 means empty or overwritten by stale script): $${#GITHUB_PAT}" >&2
          echo 'Stale /opt/setup-runners.sh overwrites env PAT unless it uses $${GITHUB_PAT:-<baked>}; sync from repo or re-run cloud-init.' >&2
          continue
        fi

        for i in $(seq 1 $RUNNER_COUNT); do
          RUNNER_DIR="$RUNNER_HOME/actions-runner-$REPO_SHORT-$i"
          RUNNER_NAME="$(hostname)-$REPO_SHORT-$i"

          echo "Setting up runner $RUNNER_NAME for $REPO..."

          mkdir -p "$RUNNER_DIR"
          cd "$RUNNER_DIR"

          # Download runner
          curl -sL "https://github.com/actions/runner/releases/download/v$RUNNER_VERSION/actions-runner-$RUNNER_ARCH-$RUNNER_VERSION.tar.gz" | tar xz

          chown -R $RUNNER_USER:$RUNNER_USER "$RUNNER_DIR"

          # Configure runner (as deploy user)
          sudo -u $RUNNER_USER ./config.sh \
            --url "https://github.com/$REPO" \
            --token "$REG_TOKEN" \
            --name "$RUNNER_NAME" \
            --labels "$RUNNER_LABELS" \
            --unattended \
            --replace

          # Install and start as systemd service
          ./svc.sh install $RUNNER_USER
          ./svc.sh start

          echo "Runner $RUNNER_NAME started successfully"
        done
      done

  # Docker cleanup cron (prevent disk fill from CI builds)
  - path: /etc/cron.daily/docker-cleanup
    permissions: "0755"
    content: |
      #!/bin/bash
      docker system prune -af --filter "until=24h" > /dev/null 2>&1 || true

runcmd:
  # Install Docker using official apt repository
  - apt-get update
  - apt-get install -y ca-certificates curl gnupg
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Add deploy user to docker group
  - usermod -aG docker deploy || true

  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Verify installations
  - docker --version
  - docker compose version

  # Install and start GitHub runners
  - /opt/setup-runners.sh

  # Enable and start fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Enable unattended upgrades
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  # Restart SSH to apply hardening
  - systemctl restart ssh

  # Configure firewall (SSH only — no web traffic on this VM)
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp comment 'SSH'
  - ufw --force enable

final_message: |
  CI Runner / Jump Host setup complete.
  - 3 GitHub runners registered per repo
  - SSH hardened (key-only, fail2ban)
  - Docker installed for CI builds
  - UFW firewall enabled (SSH only)
  Access: ssh deploy@ci.scanorbit.cloud
