#cloud-config

# =============================================================================
# Security-Hardened Cloud-Init for ScanOrbit VM
# =============================================================================
# Features:
# - Non-root deploy user with sudo access
# - SSH key-only authentication (password disabled)
# - Root login disabled
# - fail2ban for brute-force protection
# - Automatic security updates
# - UFW firewall
# =============================================================================

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - make
  - fail2ban
  - unattended-upgrades
  - apt-listchanges

# Create non-root user for deployments
users:
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
%{ for key in ssh_public_keys ~}
      - ${key}
%{ endfor ~}

write_files:
  # SSH hardening configuration
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      # Disable root login
      PermitRootLogin no

      # Disable password authentication (key-only)
      PasswordAuthentication no
      ChallengeResponseAuthentication no
      UsePAM yes

      # Only allow deploy user
      AllowUsers deploy

      # Security settings
      X11Forwarding no
      MaxAuthTries 3
      ClientAliveInterval 300
      ClientAliveCountMax 2

      # Use strong ciphers
      Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
      MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
      KexAlgorithms curve25519-sha256@libssh.org,diffie-hellman-group16-sha512

  # fail2ban jail configuration
  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 1h
      findtime = 10m
      maxretry = 3
      backend = systemd

      [sshd]
      enabled = true
      port = 22
      filter = sshd
      maxretry = 3
      bantime = 1h

  # Unattended upgrades configuration
  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "$${distro_id}:$${distro_codename}";
          "$${distro_id}:$${distro_codename}-security";
          "$${distro_id}ESMApps:$${distro_codename}-apps-security";
          "$${distro_id}ESM:$${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Package-Blacklist {
      };
      Unattended-Upgrade::DevRelease "auto";
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::Automatic-Reboot-Time "03:00";

  # Enable automatic updates
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  # Docker daemon configuration
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }

  # =============================================================================
  # GDPR Compliance Scripts (loaded from deploy/scripts/)
  # =============================================================================

  # TLS Certificate Generation Script
  - path: /opt/scanorbit/deploy/scripts/generate-certs.sh
    permissions: "0755"
    content: |
      ${indent(6, script_gen_certs)}

  # Application setup script
  - path: /opt/setup-app.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -e

      APP_DIR="/opt/scanorbit"
      DEPLOY_DIR="$$APP_DIR/deploy"

      # Create application directory structure
      sudo mkdir -p $$APP_DIR
      sudo chown deploy:deploy $$APP_DIR
      cd $$APP_DIR

      # Create required directories
      mkdir -p data/postgres data/redis logs
      mkdir -p deploy/certs/postgres deploy/certs/redis
      sudo chmod +x /opt/scanorbit/deploy/scripts/generate-certs.sh
      sudo /opt/scanorbit/deploy/scripts/generate-certs.sh

runcmd:
  # Install Docker using official apt repository (ensures latest version)
  - apt-get update
  - apt-get install -y ca-certificates curl gnupg
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Add deploy user to docker group
  - usermod -aG docker deploy || true

  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Verify installations
  - docker --version
  - docker compose version

  # Run application setup as deploy user
  - sudo -u deploy /opt/setup-app.sh

  # Enable and start fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Enable unattended upgrades
  - systemctl enable unattended-upgrades
  - systemctl start unattended-upgrades

  # Restart SSH to apply hardening
  - systemctl restart ssh

  # Configure firewall (ufw)
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp comment 'SSH'
  - ufw allow 80/tcp comment 'HTTP'
  - ufw allow 443/tcp comment 'HTTPS'
  - ufw --force enable

final_message: |
        Setup complete
        Next steps:
        1. Copy deployment files (from repository root):
           # Using rsync for safer incremental updates (preserves existing certs/data)
           rsync -avz --exclude='certs/' --exclude='data/' --exclude='logs/' \
             deploy/ deploy@scanorbit.cloud:/opt/scanorbit/
           # Or use scp if rsync is not available (will overwrite all files):
           # scp -r deploy/ deploy@scanorbit.cloud:/opt/scanorbit/
           scp deploy/docker-compose.yml deploy@scanorbit.cloud:/opt/scanorbit/deploy/docker-compose.yml
           scp .env.prod deploy@scanorbit.cloud:/opt/scanorbit/deploy/.env
        2. Start services: cd /opt/scanorbit/deploy && docker compose up -d
