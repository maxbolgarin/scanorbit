# ScanOrbit Alertmanager Configuration
# Routes alerts to appropriate channels based on severity
#
# NOTE: Set these environment variables in your .env file:
#   SLACK_WEBHOOK_URL, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, TELEGRAM_THREAD_ID

global:
  # ResolveTimeout is the time after which an alert is declared resolved
  # if it has not been updated
  resolve_timeout: 5m

  # Slack webhook URL for notifications (from env)
  slack_api_url: '${SLACK_WEBHOOK_URL}'

  # Telegram Bot API URL
  telegram_api_url: 'https://api.telegram.org'

# Template files for custom notification templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree for alert routing
route:
  # Default receiver for all alerts
  receiver: 'default-notifications'

  # How long to wait before sending a notification about new alerts
  group_wait: 30s

  # How long to wait before sending notification about new alerts
  # that are added to a group of alerts for which an initial notification
  # has already been sent
  group_interval: 5m

  # How long to wait before re-sending a notification
  repeat_interval: 4h

  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'job']

  # Child routes for specific alert routing
  routes:
    # Critical alerts - immediate notification to both Slack and Telegram
    - receiver: 'critical-alerts'
      match:
        severity: critical
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Warning alerts - standard notification
    - receiver: 'warning-alerts'
      match:
        severity: warning
      group_wait: 1m
      repeat_interval: 4h

    # Database alerts - specific channel
    - receiver: 'database-alerts'
      match_re:
        alertname: '^Postgres.*|^Redis.*'
      continue: true

    # Job processing alerts
    - receiver: 'job-alerts'
      match_re:
        alertname: '^Job.*|^DeadLetter.*|^NoJobs.*'
      continue: true

# Inhibition rules to suppress duplicate/redundant alerts
inhibit_rules:
  # If a service is down, suppress all other alerts for that service
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['job']

  # If PostgreSQL is down, suppress connection/slow query alerts
  - source_match:
      alertname: 'PostgresDown'
    target_match_re:
      alertname: 'PostgresHigh.*|PostgresSlow.*'
    equal: ['job']

  # If Redis is down, suppress memory/connection alerts
  - source_match:
      alertname: 'RedisDown'
    target_match_re:
      alertname: 'RedisHigh.*|RedisLow.*|RedisEvictions'
    equal: ['job']

  # Critical alerts suppress warning alerts for the same issue
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']

# Receivers define notification integrations
receivers:
  # Default notifications - sends to both Slack and Telegram
  - name: 'default-notifications'
    slack_configs:
      - channel: '#scanorbit-alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}:fire:{{ else }}:white_check_mark:{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          *Details:*
            {{ range .Labels.SortedPairs }}- *{{ .Name }}:* `{{ .Value }}`
            {{ end }}
          {{ end }}
        actions:
          - type: button
            text: 'Runbook'
            url: '{{ (index .Alerts 0).Annotations.runbook_url }}'
          - type: button
            text: 'Grafana'
            url: 'http://localhost:3001/d/scanorbit-overview'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        message_thread_id: ${TELEGRAM_THREAD_ID}
        send_resolved: true
        parse_mode: HTML
        message: |-
          {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} <b>[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}</b>

          {{ range .Alerts }}
          <b>Alert:</b> {{ .Labels.alertname }}
          <b>Severity:</b> {{ .Labels.severity }}
          <b>Description:</b> {{ .Annotations.description }}
          {{ end }}

  # Critical alerts - high priority (both Slack and Telegram)
  - name: 'critical-alerts'
    slack_configs:
      - channel: '#scanorbit-alerts-critical'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: ':rotating_light: [CRITICAL] {{ .CommonLabels.alertname }}'
        text: |-
          *Status:* {{ .Status | toUpper }}
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Description:* {{ .Annotations.description }}
          *Summary:* {{ .Annotations.summary }}
          {{ end }}
        actions:
          - type: button
            text: 'Runbook'
            url: '{{ (index .Alerts 0).Annotations.runbook_url }}'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        message_thread_id: ${TELEGRAM_THREAD_ID}
        send_resolved: true
        parse_mode: HTML
        message: |-
          🚨 <b>[CRITICAL] {{ .CommonLabels.alertname }}</b>

          <b>Status:</b> {{ .Status | toUpper }}
          {{ range .Alerts }}
          <b>Alert:</b> {{ .Labels.alertname }}
          <b>Description:</b> {{ .Annotations.description }}
          <b>Summary:</b> {{ .Annotations.summary }}
          {{ end }}

          <a href="{{ (index .Alerts 0).Annotations.runbook_url }}">📖 Runbook</a>

  # Warning alerts (both Slack and Telegram)
  - name: 'warning-alerts'
    slack_configs:
      - channel: '#scanorbit-alerts'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: ':warning: [WARNING] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        message_thread_id: ${TELEGRAM_THREAD_ID}
        send_resolved: true
        parse_mode: HTML
        message: |-
          {{ if eq .Status "firing" }}⚠️{{ else }}✅{{ end }} <b>[WARNING] {{ .CommonLabels.alertname }}</b>

          {{ range .Alerts }}
          <b>Alert:</b> {{ .Labels.alertname }}
          <b>Description:</b> {{ .Annotations.description }}
          {{ end }}

  # Database alerts (both Slack and Telegram)
  - name: 'database-alerts'
    slack_configs:
      - channel: '#scanorbit-alerts-db'
        send_resolved: true
        title: ':floppy_disk: [DATABASE] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        message_thread_id: ${TELEGRAM_THREAD_ID}
        send_resolved: true
        parse_mode: HTML
        message: |-
          {{ if eq .Status "firing" }}💾{{ else }}✅{{ end }} <b>[DATABASE] {{ .CommonLabels.alertname }}</b>

          {{ range .Alerts }}
          <b>Alert:</b> {{ .Labels.alertname }}
          <b>Severity:</b> {{ .Labels.severity }}
          <b>Description:</b> {{ .Annotations.description }}
          {{ end }}

  # Job processing alerts (both Slack and Telegram)
  - name: 'job-alerts'
    slack_configs:
      - channel: '#scanorbit-alerts-jobs'
        send_resolved: true
        title: ':gear: [JOBS] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        message_thread_id: ${TELEGRAM_THREAD_ID}
        send_resolved: true
        parse_mode: HTML
        message: |-
          {{ if eq .Status "firing" }}⚙️{{ else }}✅{{ end }} <b>[JOBS] {{ .CommonLabels.alertname }}</b>

          {{ range .Alerts }}
          <b>Alert:</b> {{ .Labels.alertname }}
          <b>Severity:</b> {{ .Labels.severity }}
          <b>Description:</b> {{ .Annotations.description }}
          {{ end }}

  # Telegram-only receiver for on-call escalation
  - name: 'telegram-oncall'
    telegram_configs:
      - bot_token: '${TELEGRAM_BOT_TOKEN}'
        chat_id: ${TELEGRAM_CHAT_ID}
        message_thread_id: ${TELEGRAM_THREAD_ID}
        send_resolved: true
        parse_mode: HTML
        disable_notifications: false
        message: |-
          {{ if eq .Status "firing" }}🚨 <b>ON-CALL ALERT</b> 🚨{{ else }}✅ <b>RESOLVED</b>{{ end }}

          <b>{{ .CommonLabels.alertname }}</b>
          <b>Severity:</b> {{ .CommonLabels.severity }}

          {{ range .Alerts }}
          {{ .Annotations.description }}
          {{ end }}

          <i>Time: {{ .CommonAnnotations.startsAt }}</i>
