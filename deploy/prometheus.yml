# Prometheus configuration for ScanOrbit

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'scanorbit'

# Alerting configuration (optional - can be configured later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional - can be added later)
# rule_files:
#   - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ScanOrbit API Service
  - job_name: 'scanorbit-api'
    static_configs:
      - targets: ['api:4000']
    metrics_path: /metrics
    scrape_interval: 10s

  # ScanOrbit Scanner Worker
  - job_name: 'scanorbit-scanner'
    static_configs:
      - targets: ['scanner:9090']
    metrics_path: /metrics
    scrape_interval: 10s

  # ScanOrbit Analyzer Worker
  - job_name: 'scanorbit-analyzer'
    static_configs:
      - targets: ['analyzer:9091']
    metrics_path: /metrics
    scrape_interval: 10s

  # Redis (if redis-exporter is added later)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # PostgreSQL (if postgres-exporter is added later)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
