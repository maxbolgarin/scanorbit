# =============================================================================
# Docker Secrets
# =============================================================================
# Sensitive values are stored in files under ./secrets/ (not in .env.prod).
# Create them with: ./scripts/setup-secrets.sh
# Secrets are mounted into containers at /run/secrets/<name> (in-memory tmpfs).
# They never appear in `docker inspect` or process environment listings.
# =============================================================================
secrets:
  # Admin superuser (for init scripts and db-init containers only)
  postgres_password:
    file: ./secrets/postgres_password
  # Per-service database URLs (least-privilege users)
  so_api_database_url:
    file: ./secrets/so_api_database_url
  so_migrate_database_url:
    file: ./secrets/so_migrate_database_url
  so_scanner_database_url:
    file: ./secrets/so_scanner_database_url
  so_analyzer_database_url:
    file: ./secrets/so_analyzer_database_url
  # Per-service passwords (for init-db and third-party containers)
  so_api_password:
    file: ./secrets/so_api_password
  so_migrate_password:
    file: ./secrets/so_migrate_password
  so_scanner_password:
    file: ./secrets/so_scanner_password
  so_analyzer_password:
    file: ./secrets/so_analyzer_password
  so_backup_password:
    file: ./secrets/so_backup_password
  so_exporter_password:
    file: ./secrets/so_exporter_password
  so_umami_password:
    file: ./secrets/so_umami_password
  so_listmonk_password:
    file: ./secrets/so_listmonk_password
  redis_password:
    file: ./secrets/redis_password
  redis_url:
    file: ./secrets/redis_url
  jwt_secret:
    file: ./secrets/jwt_secret
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret
  totp_encryption_key:
    file: ./secrets/totp_encryption_key
  oauth_encryption_key:
    file: ./secrets/oauth_encryption_key
  google_client_secret:
    file: ./secrets/google_client_secret
  github_client_secret:
    file: ./secrets/github_client_secret
  stripe_secret_key:
    file: ./secrets/stripe_secret_key
  stripe_webhook_secret:
    file: ./secrets/stripe_webhook_secret
  aws_access_key_id:
    file: ./secrets/aws_access_key_id
  aws_secret_access_key:
    file: ./secrets/aws_secret_access_key
  backup_encryption_key:
    file: ./secrets/backup_encryption_key
  scw_access_key:
    file: ./secrets/scw_access_key
  scw_secret_key:
    file: ./secrets/scw_secret_key
  smtp_pass:
    file: ./secrets/smtp_pass

services:
  # Reverse proxy with automatic TLS
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@scanorbit.cloud}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
      app:
        condition: service_started
      landing:
        condition: service_started
    networks:
      - scanorbit

  # Database Initialization (creates databases, users, schema, grants)
  # Idempotent — safe to re-run on every `docker compose up`
  init-db:
    image: postgres:17-alpine
    restart: "no"
    entrypoint: ["/bin/sh", "/scripts/init-db.sh"]
    environment:
      - PGHOST=postgres
      - PGUSER=${POSTGRES_USER:-scanorbit}
      - PGSSLMODE=require
      - PGSSLROOTCERT=/certs/ca.crt
    secrets:
      - postgres_password
      - so_migrate_password
      - so_api_password
      - so_scanner_password
      - so_analyzer_password
      - so_backup_password
      - so_exporter_password
      - so_umami_password
      - so_listmonk_password
    volumes:
      - ./scripts/init-db.sh:/scripts/init-db.sh:ro
      - ./scripts/init-db.sql:/scripts/init-db.sql:ro
      - ./certs/postgres/ca.crt:/certs/ca.crt:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scanorbit

  # Database Migrations (runs before API starts)
  # Uses so_migrate user — DB owner with full DDL access
  migrate:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      - NODE_ENV=production
      - DB_CA_CERT=/certs/postgres-ca.crt
      - NODE_EXTRA_CA_CERTS=/certs/postgres-ca.crt
    secrets:
      - source: so_migrate_database_url
        target: database_url
      - redis_url
      - jwt_secret
      - jwt_refresh_secret
      - totp_encryption_key
      - oauth_encryption_key
    volumes:
      - ./certs/postgres/ca.crt:/certs/postgres-ca.crt:ro
    working_dir: /app/apps/api
    command: node dist/db/migrate.js
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks:
      - scanorbit
    # Note: don't put this behind a `profile`. The `api` service depends on `migrate`,
    # and Docker Compose treats non-enabled profile services as undefined.
    # Note: No auto-deploy — this is a one-shot migration job invoked explicitly by
    # deploy.sh before the api service is restarted.

  # Node.js API
  # Uses so_api user — full DML on all tables, no DDL
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint/secret-entrypoint.sh"]
    command: ["node", "dist/index.js"]
    environment:
      - NODE_ENV=production
      - PORT=4000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DB_CA_CERT=/certs/postgres-ca.crt
      - NODE_EXTRA_CA_CERTS=/certs/postgres-ca.crt
      - REDIS_CA_CERT=/certs/redis-ca.crt
      # Google OAuth (client ID is not secret)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-}
      # GitHub OAuth (client ID is not secret)
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-}
      # Frontend & CORS
      - FRONTEND_URL=${FRONTEND_URL}
      # Cookie domain for cross-subdomain auth (e.g., .scanorbit.cloud)
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      # AWS region (credentials via secrets)
      - AWS_REGION=${AWS_REGION:-eu-central-1}
      # Network/Security
      # Include Docker bridge subnet (172.22.0.0/16) so rate limiting trusts Caddy's X-Forwarded-For
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-127.0.0.1,::1,172.22.0.0/16}
      # Email Configuration
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-smtp}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      # SMTP Configuration (password via secrets)
      - SMTP_ENABLED=${SMTP_ENABLED:-true}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # Stripe Configuration (secrets via Docker secrets)
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-}
      - STRIPE_TEAM_PRICE_ID=${STRIPE_TEAM_PRICE_ID:-}
      - STRIPE_TRIAL_DAYS=${STRIPE_TRIAL_DAYS:-7}
      # Listmonk Newsletter
      - LISTMONK_API_URL=${LISTMONK_API_URL:-http://listmonk:9000}
      - LISTMONK_API_USER=${LISTMONK_ADMIN_USER:-admin}
      - LISTMONK_API_PASSWORD=${LISTMONK_ADMIN_PASSWORD:-}
      - LISTMONK_LIST_COLD_LEADS=${LISTMONK_LIST_COLD_LEADS:-0}
      - LISTMONK_LIST_SUBSCRIBERS=${LISTMONK_LIST_SUBSCRIBERS:-0}
      - LISTMONK_LIST_FREE_NEW=${LISTMONK_LIST_FREE_NEW:-0}
      - LISTMONK_LIST_FREE_SCANNED=${LISTMONK_LIST_FREE_SCANNED:-0}
      - LISTMONK_LIST_TRIAL_NEW=${LISTMONK_LIST_TRIAL_NEW:-0}
      - LISTMONK_LIST_TRIAL_ACTIVE=${LISTMONK_LIST_TRIAL_ACTIVE:-0}
      - LISTMONK_LIST_PAID_PRO=${LISTMONK_LIST_PAID_PRO:-0}
      - LISTMONK_LIST_PAID_TEAM=${LISTMONK_LIST_PAID_TEAM:-0}
      - LISTMONK_TEMPLATE_COLD_DAY0_PAIN=${LISTMONK_TEMPLATE_COLD_DAY0_PAIN:-0}
      - LISTMONK_TEMPLATE_COLD_DAY4_GDPR=${LISTMONK_TEMPLATE_COLD_DAY4_GDPR:-0}
      - LISTMONK_TEMPLATE_COLD_DAY10_BREAKUP=${LISTMONK_TEMPLATE_COLD_DAY10_BREAKUP:-0}
      - LISTMONK_TEMPLATE_SUBS_DAY0_WELCOME=${LISTMONK_TEMPLATE_SUBS_DAY0_WELCOME:-0}
      - LISTMONK_TEMPLATE_SUBS_DAY3_SECURITY=${LISTMONK_TEMPLATE_SUBS_DAY3_SECURITY:-0}
      - LISTMONK_TEMPLATE_SUBS_DAY7_COST=${LISTMONK_TEMPLATE_SUBS_DAY7_COST:-0}
      - LISTMONK_TEMPLATE_SUBS_DAY11_GDPR=${LISTMONK_TEMPLATE_SUBS_DAY11_GDPR:-0}
      - LISTMONK_TEMPLATE_SUBS_DAY16_SOCIAL_PROOF=${LISTMONK_TEMPLATE_SUBS_DAY16_SOCIAL_PROOF:-0}
      - LISTMONK_TEMPLATE_SUBS_DAY21_FINAL_CTA=${LISTMONK_TEMPLATE_SUBS_DAY21_FINAL_CTA:-0}
      - LISTMONK_TEMPLATE_FREE_NEW_DAY0_WELCOME=${LISTMONK_TEMPLATE_FREE_NEW_DAY0_WELCOME:-0}
      - LISTMONK_TEMPLATE_FREE_NEW_DAY2_SECURITY=${LISTMONK_TEMPLATE_FREE_NEW_DAY2_SECURITY:-0}
      - LISTMONK_TEMPLATE_FREE_NEW_DAY5_VALUE=${LISTMONK_TEMPLATE_FREE_NEW_DAY5_VALUE:-0}
      - LISTMONK_TEMPLATE_FREE_SCANNED_DAY0_RESULTS=${LISTMONK_TEMPLATE_FREE_SCANNED_DAY0_RESULTS:-0}
      - LISTMONK_TEMPLATE_FREE_SCANNED_DAY2_CRITICAL=${LISTMONK_TEMPLATE_FREE_SCANNED_DAY2_CRITICAL:-0}
      - LISTMONK_TEMPLATE_FREE_SCANNED_DAY5_COST=${LISTMONK_TEMPLATE_FREE_SCANNED_DAY5_COST:-0}
      - LISTMONK_TEMPLATE_FREE_SCANNED_DAY10_BREAKUP=${LISTMONK_TEMPLATE_FREE_SCANNED_DAY10_BREAKUP:-0}
      - LISTMONK_TEMPLATE_TRIAL_NEW_DAY0_WELCOME=${LISTMONK_TEMPLATE_TRIAL_NEW_DAY0_WELCOME:-0}
      - LISTMONK_TEMPLATE_TRIAL_NEW_DAY3_STUCK=${LISTMONK_TEMPLATE_TRIAL_NEW_DAY3_STUCK:-0}
      - LISTMONK_TEMPLATE_TRIAL_ACTIVE_DAY3_DEEPEN=${LISTMONK_TEMPLATE_TRIAL_ACTIVE_DAY3_DEEPEN:-0}
      - LISTMONK_TEMPLATE_TRIAL_ACTIVE_DAY5_WARNING=${LISTMONK_TEMPLATE_TRIAL_ACTIVE_DAY5_WARNING:-0}
      - LISTMONK_TEMPLATE_TRIAL_ACTIVE_DAY6_LASTDAY=${LISTMONK_TEMPLATE_TRIAL_ACTIVE_DAY6_LASTDAY:-0}
      - LISTMONK_TEMPLATE_TRIAL_ACTIVE_DAY9_WINBACK=${LISTMONK_TEMPLATE_TRIAL_ACTIVE_DAY9_WINBACK:-0}
      - LISTMONK_TEMPLATE_PAID_PRO_DAY0_WELCOME=${LISTMONK_TEMPLATE_PAID_PRO_DAY0_WELCOME:-0}
      - LISTMONK_TEMPLATE_PAID_TEAM_DAY0_WELCOME=${LISTMONK_TEMPLATE_PAID_TEAM_DAY0_WELCOME:-0}
      # Scaleway bounce webhook secret
      - SCALEWAY_WEBHOOK_SECRET=${SCALEWAY_WEBHOOK_SECRET:-}
    secrets:
      - source: so_api_database_url
        target: database_url
      - redis_url
      - jwt_secret
      - jwt_refresh_secret
      - totp_encryption_key
      - oauth_encryption_key
      - google_client_secret
      - github_client_secret
      - stripe_secret_key
      - stripe_webhook_secret
      - aws_access_key_id
      - aws_secret_access_key
      - smtp_pass
    volumes:
      - ./certs/postgres/ca.crt:/certs/postgres-ca.crt:ro
      - ./certs/redis/ca.crt:/certs/redis-ca.crt:ro
      - ./entrypoints/secret-entrypoint.sh:/entrypoint/secret-entrypoint.sh:ro
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanorbit

  # React SPA
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - scanorbit

  # Astro Landing Page
  landing:
    image: ghcr.io/${GITHUB_REPOSITORY}/landing:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - scanorbit

  # Go Scanner Worker
  # Uses so_scanner user — RW on scan tables, RO on user/org tables
  # Uses entrypoints/secret-entrypoint.sh to export AWS credentials as env vars.
  scanner:
    image: ghcr.io/${GITHUB_REPOSITORY}/scanner:${IMAGE_TAG:-latest}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint/secret-entrypoint.sh"]
    command: ["./scanner"]
    environment:
      - DB_CA_CERT=/certs/postgres-ca.crt
      - REDIS_CA_CERT=/certs/redis-ca.crt
      - AWS_REGION=${AWS_REGION:-eu-central-1}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SCAN_CONCURRENCY=${SCAN_CONCURRENCY:-10}
      - SCAN_TIMEOUT_MINUTES=${SCAN_TIMEOUT_MINUTES:-60}
      - SHUTDOWN_TIMEOUT_SECONDS=${SHUTDOWN_TIMEOUT_SECONDS:-30}
      - REQUIRED_TAGS=${REQUIRED_TAGS:-}
      - METRICS_BIND_ADDR=0.0.0.0  # Bind to all interfaces for Docker network access
    secrets:
      - source: so_scanner_database_url
        target: database_url
      - redis_url
      - oauth_encryption_key
      - aws_access_key_id
      - aws_secret_access_key
    volumes:
      - ./certs/postgres/ca.crt:/certs/postgres-ca.crt:ro
      - ./certs/redis/ca.crt:/certs/redis-ca.crt:ro
      - ./entrypoints/secret-entrypoint.sh:/entrypoint/secret-entrypoint.sh:ro
    ports:
      - "127.0.0.1:9090:9090"  # Metrics endpoint (localhost only)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanorbit

  # Go Analyzer Worker
  # Uses so_analyzer user — RW on findings/jobs, RO on scans/resources
  analyzer:
    image: ghcr.io/${GITHUB_REPOSITORY}/analyzer:${IMAGE_TAG:-latest}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint/secret-entrypoint.sh"]
    command: ["./analyzer"]
    environment:
      - DB_CA_CERT=/certs/postgres-ca.crt
      - REDIS_CA_CERT=/certs/redis-ca.crt
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SHUTDOWN_TIMEOUT_SECONDS=${SHUTDOWN_TIMEOUT_SECONDS:-30}
      - METRICS_BIND_ADDR=0.0.0.0  # Bind to all interfaces for Docker network access
    secrets:
      - source: so_analyzer_database_url
        target: database_url
      - redis_url
      - oauth_encryption_key
    volumes:
      - ./certs/postgres/ca.crt:/certs/postgres-ca.crt:ro
      - ./certs/redis/ca.crt:/certs/redis-ca.crt:ro
      - ./entrypoints/secret-entrypoint.sh:/entrypoint/secret-entrypoint.sh:ro
    ports:
      - "127.0.0.1:9091:9091"  # Metrics endpoint (localhost only)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanorbit

  # PostgreSQL Database (with SSL/TLS)
  # Uses built-in POSTGRES_PASSWORD_FILE support
  # Data stored on host filesystem at POSTGRES_DATA_DIR for durability
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Copy certs to local dir and fix permissions for postgres user
        mkdir -p /var/lib/postgresql/certs
        cp /certs-source/* /var/lib/postgresql/certs/
        chown postgres:postgres /var/lib/postgresql/certs/*
        chmod 600 /var/lib/postgresql/certs/server.key
        chmod 644 /var/lib/postgresql/certs/server.crt /var/lib/postgresql/certs/ca.crt
        # Start PostgreSQL with SSL
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/var/lib/postgresql/certs/server.crt \
          -c ssl_key_file=/var/lib/postgresql/certs/server.key \
          -c ssl_ca_file=/var/lib/postgresql/certs/ca.crt \
          -c ssl_min_protocol_version=TLSv1.3 \
          -c log_statement=mod \
          -c log_connections=on \
          -c log_disconnections=on
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-scanorbit}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_DB=${POSTGRES_DB:-scanorbit}
    secrets:
      - postgres_password
    volumes:
      - ${POSTGRES_DATA_DIR:-/var/lib/scanorbit/postgres}:/var/lib/postgresql/data
      - ./certs/postgres:/certs-source:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanorbit} -d ${POSTGRES_DB:-scanorbit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scanorbit

  # Redis Cache & Queue (with TLS + Password + Production Config)
  # Reads password from Docker secret file in entrypoint
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Read password from Docker secret
        REDIS_PASSWORD=$$(cat /run/secrets/redis_password | tr -d '\n')
        # Copy certs to local dir and fix permissions for redis user
        mkdir -p /data/certs
        cp /tls-source/* /data/certs/
        chown redis:redis /data/certs/*
        chmod 600 /data/certs/redis.key
        chmod 644 /data/certs/redis.crt /data/certs/ca.crt
        # Start Redis with production config and TLS
        exec redis-server /etc/redis/redis.conf \
          --requirepass "$$REDIS_PASSWORD" \
          --tls-port 6379 \
          --port 0 \
          --tls-cert-file /data/certs/redis.crt \
          --tls-key-file /data/certs/redis.key \
          --tls-ca-cert-file /data/certs/ca.crt \
          --tls-auth-clients no \
          --tls-protocols "TLSv1.3"
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
      - ./certs/redis:/tls-source:ro
      - ./redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --tls --cert /data/certs/redis.crt --key /data/certs/redis.key --cacert /data/certs/ca.crt -a $$(cat /run/secrets/redis_password) ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scanorbit

  # PostgreSQL Backup Service (GDPR Compliance)
  # Uses so_backup user — read-only access for pg_dump
  postgres-backup:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - PGHOST=postgres
      - PGUSER=so_backup
      - PGDATABASE=${POSTGRES_DB:-scanorbit}
      - PGSSLMODE=require
      - PGSSLROOTCERT=/certs/ca.crt
      - SCW_BUCKET_NAME=${SCW_BUCKET_NAME:-scanorbit-backups}
      - SCW_REGION=${SCW_REGION:-nl-ams}
    secrets:
      - source: so_backup_password
        target: postgres_password
      - backup_encryption_key
      - scw_access_key
      - scw_secret_key
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - ./scripts/crontab:/etc/crontabs/root:ro
      - ./entrypoints/backup-entrypoint.sh:/entrypoint/backup-entrypoint.sh:ro
      - ./certs/postgres:/certs:ro
      - backup_temp:/backups
    entrypoint: ["/bin/sh", "/entrypoint/backup-entrypoint.sh"]
    command: ["crond", "-f", "-l", "2"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scanorbit

  # PostgreSQL Restore (on-demand, not auto-started)
  # Usage:
  #   docker compose -f docker-compose.prod.yml run --rm db-restore --list
  #   docker compose -f docker-compose.prod.yml run --rm db-restore --verify daily/<file>
  #   docker compose -f docker-compose.prod.yml run --rm db-restore daily/<file>
  # Uses so_migrate user — DB owner with full DDL access (needed for DROP/CREATE)
  db-restore:
    image: postgres:17-alpine
    profiles: ["restore"]
    restart: "no"
    environment:
      - PGHOST=postgres
      - PGUSER=so_migrate
      - PGDATABASE=${POSTGRES_DB:-scanorbit}
      - PGSSLMODE=require
      - PGSSLROOTCERT=/certs/ca.crt
      - SCW_BUCKET_NAME=${SCW_BUCKET_NAME:-scanorbit-backups}
      - SCW_REGION=${SCW_REGION:-nl-ams}
    secrets:
      - source: so_migrate_password
        target: postgres_password
      - backup_encryption_key
      - scw_access_key
      - scw_secret_key
    volumes:
      - ./scripts/restore.sh:/usr/local/bin/restore.sh:ro
      - ./certs/postgres/ca.crt:/certs/ca.crt:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/restore.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scanorbit

  # GDPR Data Retention Cleanup (runs daily at 03:00 UTC)
  # Uses so_api user — same as API (needs DELETE on retention tables)
  retention-cleanup:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_CA_CERT=/certs/postgres-ca.crt
      - NODE_EXTRA_CA_CERTS=/certs/postgres-ca.crt
      - RETENTION_RESOURCES_DAYS=${RETENTION_RESOURCES_DAYS:-90}
      - RETENTION_FINDINGS_RESOLVED_DAYS=${RETENTION_FINDINGS_RESOLVED_DAYS:-180}
      - RETENTION_SCANS_DAYS=${RETENTION_SCANS_DAYS:-365}
      - RETENTION_AUDIT_LOGS_DAYS=${RETENTION_AUDIT_LOGS_DAYS:-730}
    secrets:
      - source: so_api_database_url
        target: database_url
    volumes:
      - ./certs/postgres/ca.crt:/certs/postgres-ca.crt:ro
    working_dir: /app/apps/api
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Write crontab directly (avoids crontab SUID requirement in containers)
        echo "0 3 * * * cd /app/apps/api && node dist/jobs/retention-cleanup.js >> /var/log/retention.log 2>&1" > /etc/crontabs/root
        # Run crond in foreground
        crond -f -l 2
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - scanorbit

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9092:9090"  # Prometheus UI (localhost only, access via SSH tunnel)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      alertmanager:
        condition: service_healthy
    networks:
      - scanorbit

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3001:3000"  # Grafana UI (localhost only, access via SSH tunnel)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - scanorbit

  # Loki - Log aggregation
  loki:
    image: grafana/loki:2.9.6
    restart: unless-stopped
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"  # Loki API (localhost only, access via SSH tunnel)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - scanorbit

  # Alloy - Log collector (replaces Promtail)
  alloy:
    image: grafana/alloy:v1.14.0
    restart: unless-stopped
    volumes:
      - ./alloy.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:12345/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - scanorbit

  # PostgreSQL Exporter - Database metrics
  # Uses so_exporter user — pg_monitor role (statistics views only)
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    restart: unless-stopped
    environment:
      - POSTGRES_USER=so_exporter
      - POSTGRES_DB=${POSTGRES_DB:-scanorbit}
    secrets:
      - source: so_exporter_password
        target: postgres_password
    volumes:
      - ./certs/postgres/ca.crt:/certs/ca.crt:ro
      - ./entrypoints/pg-exporter-entrypoint.sh:/entrypoint/pg-exporter-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint/pg-exporter-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scanorbit

  # Redis Exporter - Cache/Queue metrics
  # Uses entrypoints/secret-entrypoint.sh to export REDIS_PASSWORD from secret
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0-alpine
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint/secret-entrypoint.sh"]
    command: ["/redis_exporter"]
    environment:
      - REDIS_ADDR=rediss://redis:6379
      - REDIS_EXPORTER_TLS_CA_CERT_FILE=/certs/ca.crt
    secrets:
      - redis_password
    volumes:
      - ./certs/redis/ca.crt:/certs/ca.crt:ro
      - ./entrypoints/secret-entrypoint.sh:/entrypoint/secret-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scanorbit

  # Alertmanager - Alert routing and notifications
  # Set SLACK_WEBHOOK_URL, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID in .env
  alertmanager:
    image: prom/alertmanager:v0.31.1
    restart: unless-stopped
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-0}
      - TELEGRAM_THREAD_ID=${TELEGRAM_THREAD_ID:-0}
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - ./entrypoints/alertmanager-entrypoint.sh:/entrypoint.sh:ro
      - alertmanager_data:/alertmanager
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "127.0.0.1:9093:9093"  # Alertmanager (localhost only, access via SSH tunnel)
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - scanorbit

  # Umami Analytics - Privacy-first self-hosted web analytics
  # Uses so_umami user — owner of umami database
  umami:
    image: docker.umami.is/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      - POSTGRES_USER=so_umami
      - APP_SECRET=${UMAMI_APP_SECRET}
      - TRACKER_SCRIPT_NAME=t.js
      - COLLECT_API_ENDPOINT=/collect
      - NODE_EXTRA_CA_CERTS=/certs/postgres-ca.crt
    secrets:
      - source: so_umami_password
        target: postgres_password
    volumes:
      - ./entrypoints/umami-entrypoint.sh:/entrypoint/umami-entrypoint.sh:ro
      - ./certs/postgres/ca.crt:/certs/postgres-ca.crt:ro
    entrypoint: ["/bin/sh", "/entrypoint/umami-entrypoint.sh"]
    ports:
      - "127.0.0.1:3002:3000"  # Umami UI (localhost only, access via SSH tunnel)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks:
      - scanorbit

  # Listmonk Newsletter - Schema installation (idempotent)
  # Uses so_listmonk user — owner of listmonk database
  listmonk-init:
    image: listmonk/listmonk:latest
    restart: "no"
    environment:
      - LISTMONK_app__address=0.0.0.0:9000
      - LISTMONK_app__admin_username=${LISTMONK_ADMIN_USER:-admin}
      - LISTMONK_app__admin_password=${LISTMONK_ADMIN_PASSWORD}
      - LISTMONK_db__host=postgres
      - LISTMONK_db__port=5432
      - LISTMONK_db__user=so_listmonk
      - LISTMONK_db__database=listmonk
      - LISTMONK_db__ssl_mode=require
    secrets:
      - source: so_listmonk_password
        target: postgres_password
    volumes:
      - ./entrypoints/listmonk-entrypoint.sh:/entrypoint/listmonk-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint/listmonk-entrypoint.sh"]
    command: ["./listmonk", "--install", "--idempotent", "--yes", "--config", ""]
    depends_on:
      init-db:
        condition: service_completed_successfully
    networks:
      - scanorbit

  # Listmonk Newsletter - Admin UI & API (localhost only, access via SSH tunnel)
  # Uses so_listmonk user — owner of listmonk database
  listmonk:
    image: listmonk/listmonk:latest
    restart: unless-stopped
    environment:
      - LISTMONK_app__address=0.0.0.0:9000
      - LISTMONK_app__admin_username=${LISTMONK_ADMIN_USER:-admin}
      - LISTMONK_app__admin_password=${LISTMONK_ADMIN_PASSWORD}
      - LISTMONK_db__host=postgres
      - LISTMONK_db__port=5432
      - LISTMONK_db__user=so_listmonk
      - LISTMONK_db__database=listmonk
      - LISTMONK_db__ssl_mode=require
    secrets:
      - source: so_listmonk_password
        target: postgres_password
    volumes:
      - ./entrypoints/listmonk-entrypoint.sh:/entrypoint/listmonk-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint/listmonk-entrypoint.sh"]
    command: ["./listmonk", "--config", ""]
    ports:
      - "127.0.0.1:9000:9000"  # Listmonk UI (localhost only, access via SSH tunnel)
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      listmonk-init:
        condition: service_completed_successfully
    networks:
      - scanorbit

  # Listmonk Newsletter - Seed lists and transactional templates
  # Runs after Listmonk is healthy and exits when setup is complete.
  listmonk-setup:
    image: ghcr.io/${GITHUB_REPOSITORY}/listmonk-setup:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      - LISTMONK_URL=http://listmonk:9000
      - LISTMONK_USER=${LISTMONK_ADMIN_USER:-admin}
      - LISTMONK_TOKEN=${LISTMONK_ADMIN_PASSWORD}
    depends_on:
      listmonk:
        condition: service_healthy
    networks:
      - scanorbit

  maxbolgarin:
    image: ghcr.io/maxbolgarin/maxbolgarin-web:latest
    restart: unless-stopped
    networks:
      - scanorbit

volumes:
  redis_data:
  caddy_data:
  caddy_config:
  backup_temp:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:

networks:
  scanorbit:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
