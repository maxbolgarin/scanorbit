services:
  # Reverse proxy with automatic TLS
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - api
      - app
      - landing
    networks:
      - scanorbit

  # Database Migrations (runs before API starts)
  migrate:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:${IMAGE_TAG:-latest}
    restart: "no"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    working_dir: /app/apps/api
    command: node dist/db/migrate.js
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scanorbit
    # Note: don't put this behind a `profile`. The `api` service depends on `migrate`,
    # and Docker Compose treats non-enabled profile services as undefined.

  # Node.js API
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanorbit
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # React SPA
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - scanorbit
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Astro Landing Page
  landing:
    image: ghcr.io/${GITHUB_REPOSITORY}/landing:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - scanorbit
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Go Scanner Worker
  scanner:
    image: ghcr.io/${GITHUB_REPOSITORY}/scanner:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - AWS_REGION=${AWS_REGION:-eu-central-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanorbit
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Go Analyzer Worker
  analyzer:
    image: ghcr.io/${GITHUB_REPOSITORY}/analyzer:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanorbit
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-scanorbit}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-scanorbit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanorbit} -d ${POSTGRES_DB:-scanorbit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scanorbit

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scanorbit

  # Watchtower - Auto-update containers from GHCR
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_TIMEOUT=60s
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${WATCHTOWER_NOTIFICATION_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    command: --interval 300
    networks:
      - scanorbit

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  scanorbit:
    driver: bridge
