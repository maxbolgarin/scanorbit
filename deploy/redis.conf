# =============================================================================
# ScanOrbit Redis Production Configuration
# =============================================================================
# This configuration is optimized for a production queue/cache workload
# TLS and password are configured via command line in docker-compose

# =============================================================================
# MEMORY MANAGEMENT
# =============================================================================
# Set maximum memory limit (adjust based on your server capacity)
# For a typical ScanOrbit deployment, 512MB-1GB is usually sufficient
maxmemory 512mb

# Eviction policy when maxmemory is reached
# allkeys-lru: Evict any key using LRU algorithm (best for cache workloads)
# volatile-lru: Only evict keys with TTL set (best for mixed cache/queue)
# noeviction: Return errors when memory limit is reached (safest for queues)
# For ScanOrbit (queue + cache), use volatile-lru to protect queue data
maxmemory-policy volatile-lru

# Number of samples to check for LRU eviction (higher = more accurate but slower)
maxmemory-samples 10

# =============================================================================
# PERSISTENCE - RDB Snapshots
# =============================================================================
# Save to disk: save <seconds> <changes>
# Save if at least 1 key changed in 900 seconds (15 min)
save 900 1
# Save if at least 10 keys changed in 300 seconds (5 min)
save 300 10
# Save if at least 10000 keys changed in 60 seconds (1 min)
save 60 10000

# Stop accepting writes if RDB save fails (data safety)
stop-writes-on-bgsave-error yes

# Compress RDB files (recommended, small CPU cost)
rdbcompression yes

# RDB checksum for data integrity
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# =============================================================================
# PERSISTENCE - AOF (Append Only File)
# =============================================================================
# Enable AOF persistence (recommended for durability)
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# AOF fsync policy:
# always: fsync after every write (slowest, safest)
# everysec: fsync every second (good balance) - RECOMMENDED
# no: let OS decide (fastest, least safe)
appendfsync everysec

# Don't fsync during BGSAVE/BGREWRITEAOF (better performance)
no-appendfsync-on-rewrite no

# Auto-rewrite AOF when it grows by this percentage
auto-aof-rewrite-percentage 100

# Minimum AOF size before auto-rewrite triggers
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup (recover from crash)
aof-load-truncated yes

# Enable RDB-AOF hybrid persistence (Redis 7+)
aof-use-rdb-preamble yes

# =============================================================================
# CONNECTIONS
# =============================================================================
# Maximum number of connected clients
maxclients 1000

# Close connection after client is idle for N seconds (0 = disable)
timeout 300

# TCP keepalive (detect dead connections)
tcp-keepalive 300

# TCP listen backlog
tcp-backlog 511

# =============================================================================
# PERFORMANCE TUNING
# =============================================================================
# Disable Transparent Huge Pages warning (handled at OS level)
# ignore-warnings ARM64-COW-BUG

# Active defragmentation (Redis 4+)
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25

# Lazy freeing (async deletion for large objects)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# IO threads for better multi-core performance (Redis 6+)
# Recommended: 2-4 for typical workloads
io-threads 4
io-threads-do-reads yes

# =============================================================================
# SLOW LOG
# =============================================================================
# Log queries slower than N microseconds (10000 = 10ms)
slowlog-log-slower-than 10000

# Maximum slow log entries to keep
slowlog-max-len 128

# =============================================================================
# LATENCY MONITORING
# =============================================================================
# Enable latency monitoring (threshold in milliseconds)
latency-monitor-threshold 100

# =============================================================================
# CLIENT OUTPUT BUFFER LIMITS
# =============================================================================
# Normal clients: no limit
client-output-buffer-limit normal 0 0 0

# Replica clients: 256mb hard limit, 64mb soft limit for 60 seconds
client-output-buffer-limit replica 256mb 64mb 60

# Pub/Sub clients: 32mb hard limit, 8mb soft limit for 60 seconds
client-output-buffer-limit pubsub 32mb 8mb 60

# =============================================================================
# SECURITY
# =============================================================================
# Disable dangerous commands in production
# Note: Password is set via --requirepass in docker-compose
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command CONFIG "SCANORBIT_CONFIG"
rename-command SHUTDOWN "SCANORBIT_SHUTDOWN"

# =============================================================================
# LOGGING
# =============================================================================
# Log level: debug, verbose, notice, warning
loglevel notice

# Log to stdout (for Docker)
logfile ""

# =============================================================================
# CLUSTER (disabled for single-node deployment)
# =============================================================================
# cluster-enabled no

# =============================================================================
# REPLICATION (configure if using replicas)
# =============================================================================
# replica-read-only yes
# replica-serve-stale-data yes
# repl-diskless-sync yes
# repl-diskless-sync-delay 5
