# Grafana dashboard provisioning configuration

apiVersion: 1

providers:
  - name: 'ScanOrbit Dashboards'
    orgId: 1
    folder: 'ScanOrbit'
    folderUid: 'scanorbit'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
