services:
  db:
    image: postgres:17-alpine
    container_name: scanorbit-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scanorbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scanorbit}
      POSTGRES_DB: ${POSTGRES_DB:-scanorbit}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scanorbit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scanorbit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: scanorbit-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-scanorbit}:${POSTGRES_PASSWORD:-scanorbit}@db:5432/${POSTGRES_DB:-scanorbit}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src

  scanner:
    build:
      context: ./workers
      dockerfile: Dockerfile
      target: scanner
    container_name: scanorbit-scanner
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scanorbit}:${POSTGRES_PASSWORD:-scanorbit}@db:5432/${POSTGRES_DB:-scanorbit}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  analyzer:
    build:
      context: ./workers
      dockerfile: Dockerfile
      target: analyzer
    container_name: scanorbit-analyzer
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-scanorbit}:${POSTGRES_PASSWORD:-scanorbit}@db:5432/${POSTGRES_DB:-scanorbit}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
