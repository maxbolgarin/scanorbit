name: Lint & Typecheck

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check Internet Connectivity
        run: |
          if ! curl -s --head --request GET https://www.github.com | head -n 1 | grep -q "200\|301\|302"; then
            echo "Internet connection check failed"
            exit 1
          fi
          echo "Internet connectivity verified"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  lint-go:
    name: Lint Go Workers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: workers/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1
          working-directory: workers
          args: --timeout=5m

  test-go:
    name: Test Go Workers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: workers/go.sum

      - name: Test with coverage
        working-directory: workers
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Coverage summary
        working-directory: workers
        run: |
          TOTAL=$(grep '^total:' coverage.txt | awk '{print $NF}')
          echo "## Go Workers Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total coverage: ${TOTAL}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go test -cover ./... 2>&1 | grep -E '^ok|^FAIL' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        working-directory: workers
        run: |
          go build -o scanner ./cmd/scanner
          go build -o analyzer ./cmd/analyzer

  security-scan:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/typescript \
            --config p/golang \
            --config p/nodejs \
            --config p/react \
            --config p/sql-injection \
            --config p/jwt \
            --config .semgrep/ \
            --sarif --output semgrep.sarif \
            .

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  integration-test-go:
    name: Integration Test Go Workers
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: scanorbit
          POSTGRES_PASSWORD: scanorbit
          POSTGRES_DB: scanorbit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scanorbit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: workers/go.sum

      - name: Run integration tests
        working-directory: workers
        env:
          DATABASE_URL: postgres://scanorbit:scanorbit@localhost:5432/scanorbit_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          go test -v -race -tags integration -coverprofile=coverage-integration.out -covermode=atomic ./internal/store/ ./internal/queue/
          go tool cover -func=coverage-integration.out | tee coverage-integration.txt

      - name: Coverage summary
        working-directory: workers
        run: |
          TOTAL=$(grep '^total:' coverage-integration.txt | awk '{print $NF}')
          echo "## Go Workers Integration Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total coverage: ${TOTAL}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go test -tags integration -cover ./internal/store/ ./internal/queue/ 2>&1 | grep -E '^ok|^FAIL' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
