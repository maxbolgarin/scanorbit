name: Lint & Typecheck

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      force_node:
        description: Force run Node.js jobs (lint, typecheck, audit, build)
        required: false
        type: boolean
        default: false
      force_go:
        description: Force run Go jobs (lint, audit, test)
        required: false
        type: boolean
        default: false

jobs:
  changes:
    name: Detect Changes
    runs-on: [self-hosted, linux, x64]
    outputs:
      node: ${{ steps.filter.outputs.node }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - '.eslint*'
            go:
              - 'workers/**'

  lint-and-typecheck:
    name: Lint & Typecheck
    needs: [changes]
    if: needs.changes.outputs.node == 'true' || inputs.force_node
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Check Internet Connectivity
        run: |
          if ! curl -s --head --request GET https://www.github.com | head -n 1 | grep -q "200\|301\|302"; then
            echo "Internet connection check failed"
            exit 1
          fi
          echo "Internet connectivity verified"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  audit-node:
    name: Audit Node.js Dependencies
    needs: [changes]
    if: needs.changes.outputs.node == 'true' || inputs.force_node
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  audit-go:
    name: Audit Go Dependencies
    needs: [changes]
    if: needs.changes.outputs.go == 'true' || inputs.force_go
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache-dependency-path: workers/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: workers
        run: govulncheck ./...

  lint-go:
    name: Lint Go Workers
    needs: [changes]
    if: needs.changes.outputs.go == 'true' || inputs.force_go
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache-dependency-path: workers/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11
          working-directory: workers
          args: --timeout=5m

  test-go:
    name: Test Go Workers
    needs: [changes]
    if: needs.changes.outputs.go == 'true' || inputs.force_go
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache-dependency-path: workers/go.sum

      - name: Test with coverage
        working-directory: workers
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tee coverage.txt

      - name: Coverage summary
        working-directory: workers
        run: |
          TOTAL=$(grep '^total:' coverage.txt | awk '{print $NF}')
          echo "## Go Workers Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total coverage: ${TOTAL}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go test -cover ./... 2>&1 | grep -E '^ok|^FAIL' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        working-directory: workers
        run: |
          go build -o scanner ./cmd/scanner
          go build -o analyzer ./cmd/analyzer

  integration-test-go:
    name: Integration Test Go Workers
    needs: [changes]
    if: needs.changes.outputs.go == 'true' || inputs.force_go
    runs-on: [self-hosted, linux, x64]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: scanorbit
          POSTGRES_PASSWORD: scanorbit
          POSTGRES_DB: scanorbit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scanorbit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache-dependency-path: workers/go.sum

      - name: Run integration tests
        working-directory: workers
        env:
          DATABASE_URL: postgres://scanorbit:scanorbit@localhost:5432/scanorbit_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: |
          go test -v -race -tags integration -coverprofile=coverage-integration.out -covermode=atomic ./internal/store/ ./internal/queue/
          go tool cover -func=coverage-integration.out | tee coverage-integration.txt

      - name: Coverage summary
        working-directory: workers
        run: |
          TOTAL=$(grep '^total:' coverage-integration.txt | awk '{print $NF}')
          echo "## Go Workers Integration Test Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total coverage: ${TOTAL}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go test -tags integration -cover ./internal/store/ ./internal/queue/ 2>&1 | grep -E '^ok|^FAIL' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  build-check:
    name: Build Check
    needs: [changes]
    if: needs.changes.outputs.node == 'true' || inputs.force_node
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
