name: Release

on:
  workflow_dispatch:

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.release.outputs.version }}
      released: ${{ steps.release.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release
          npm install -g @semantic-release/github
          npm install -g @semantic-release/npm
          npm install -g conventional-changelog-conventionalcommits

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          npx semantic-release | tee semantic-release.log

          # Extract the published version. semantic-release prints this on success;
          # on a no-op release the line is absent and we skip the docker job.
          VERSION=$(grep -oE 'Published release [0-9]+\.[0-9]+\.[0-9]+' semantic-release.log \
            | head -n1 | awk '{print $3}')

          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "✅ Released v$VERSION"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No release was published (no relevant commits)."
          fi

  docker:
    name: Publish ${{ matrix.image.name }} image
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
            target: production
            build-args: ""
          - name: app
            context: .
            dockerfile: apps/app/Dockerfile
            target: production
            build-args: |
              VITE_PUBLIC_API_URL=/api
          - name: scanner
            context: ./workers
            dockerfile: workers/Dockerfile
            target: scanner
            build-args: ""
          - name: analyzer
            context: ./workers
            dockerfile: workers/Dockerfile
            target: analyzer
            build-args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          VERSION: ${{ needs.release.outputs.version }}
          IMAGE: ${{ matrix.image.name }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BASE="ghcr.io/${OWNER}/scanorbit-${IMAGE}"

          # Split semver into major.minor.patch for moving tags
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          {
            echo "tags<<EOF"
            echo "${BASE}:${VERSION}"
            echo "${BASE}:${MINOR}"
            echo "${BASE}:${MAJOR}"
            echo "${BASE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          build-args: ${{ matrix.image.build-args }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
