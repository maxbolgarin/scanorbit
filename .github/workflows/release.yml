name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      app: ${{ steps.filter.outputs.app }}
      landing: ${{ steps.filter.outputs.landing }}
      workers: ${{ steps.filter.outputs.workers }}
      telegram-bot: ${{ steps.filter.outputs.telegram-bot }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api/**'
            app:
              - 'apps/app/**'
            landing:
              - 'apps/landing/**'
            workers:
              - 'workers/**'
            telegram-bot:
              - 'apps/telegram-bot/**'

  # Run semantic-release to create version tag and GitHub release
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/github
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and push Docker images with version tags
  build-api:
    name: Build API
    needs:
      - release
      - changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-app:
    name: Build App
    needs:
      - release
      - changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/app
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_PUBLIC_API_URL=${{ vars.VITE_PUBLIC_API_URL }}
            VITE_SCANORBIT_AWS_ACCOUNT_ID=${{ vars.VITE_SCANORBIT_AWS_ACCOUNT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-landing:
    name: Build Landing
    needs:
      - release
      - changes
    if: needs.changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/landing
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/landing/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-workers:
    name: Build Workers
    needs:
      - release
      - changes
    if: needs.changes.outputs.workers == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        worker: [scanner, analyzer]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.worker }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./workers
          target: ${{ matrix.worker }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-telegram-bot:
    name: Build Telegram Bot
    needs:
      - release
      - changes
    if: needs.changes.outputs.telegram-bot == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/telegram-bot
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/telegram-bot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: [release, build-api, build-app, build-landing, build-workers, build-telegram-bot]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Compute deployed services
        id: services
        run: |
          services=""
          [ "${{ needs.build-api.result }}" = "success" ] && services="$services api"
          [ "${{ needs.build-app.result }}" = "success" ] && services="$services app"
          [ "${{ needs.build-landing.result }}" = "success" ] && services="$services landing"
          [ "${{ needs.build-workers.result }}" = "success" ] && services="$services scanner analyzer"
          [ "${{ needs.build-telegram-bot.result }}" = "success" ] && services="$services telegram-bot"
          echo "services=$services" >> "$GITHUB_OUTPUT"

      - name: Deploy changed services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: ${{ secrets.PROD_DEPLOY_USER }}
          key: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          script: |
            SERVICES=""
            [ "${{ needs.build-api.result }}" = "success" ] && SERVICES="$SERVICES api"
            [ "${{ needs.build-app.result }}" = "success" ] && SERVICES="$SERVICES app"
            [ "${{ needs.build-landing.result }}" = "success" ] && SERVICES="$SERVICES landing"
            [ "${{ needs.build-workers.result }}" = "success" ] && SERVICES="$SERVICES scanner analyzer"
            [ "${{ needs.build-telegram-bot.result }}" = "success" ] && SERVICES="$SERVICES telegram-bot"
            /opt/scanorbit/deploy/scripts/deploy.sh $SERVICES

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_RELEASE: ${{ needs.release.outputs.new_release_published }}
          VERSION: ${{ needs.release.outputs.new_release_version }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          HEAD_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          DEPLOYED_SERVICES: ${{ steps.services.outputs.services }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          token             = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id           = os.environ['CHAT_ID']
          thread_id         = os.environ.get('', '').strip()
          repo              = os.environ['REPO']
          actor             = os.environ['ACTOR']
          full_sha          = os.environ.get('HEAD_SHA') or os.environ['SHA']
          sha_short         = full_sha[:7]
          server            = os.environ['SERVER_URL']
          deployed_services = os.environ.get('DEPLOYED_SERVICES', '').strip()
          new_release       = os.environ.get('NEW_RELEASE')
          version           = os.environ.get('VERSION', '').strip()
          gh_token          = os.environ.get('GITHUB_TOKEN', '').strip()

          import re

          def escape_html(s: str) -> str:
              return (
                  s.replace('&', '&amp;')
                   .replace('<', '&lt;')
                   .replace('>', '&gt;')
              )

          def md_to_telegram_html(md: str) -> str:
              """Convert GitHub release Markdown to Telegram HTML."""
              result = []
              for line in md.split('\n'):
                  # Headers: ## text -> <b>text</b>
                  m = re.match(r'^#{1,6}\s+(.*)', line)
                  if m:
                      result.append(f'<b>{_inline(m.group(1))}</b>')
                      continue
                  # List items: * text -> • text
                  m = re.match(r'^\s*\*\s+(.*)', line)
                  if m:
                      result.append(f'• {_inline(m.group(1))}')
                      continue
                  result.append(_inline(line))
              return '\n'.join(result)

          def _inline(text: str) -> str:
              """Convert inline Markdown (bold, links) to Telegram HTML."""
              text = escape_html(text)
              # Links: [text](url) – entities are escaped, so match &amp; in URLs
              text = re.sub(
                  r'\[([^\]]+)\]\(([^)]+)\)',
                  r'<a href="\2">\1</a>',
                  text,
              )
              # Bold: **text**
              text = re.sub(r'\*\*([^*]+)\*\*', r'<b>\1</b>', text)
              return text

          services_line = deployed_services if deployed_services else 'n/a'
          services_line = escape_html(services_line)

          # Datetime in CET/CEST (Europe/Berlin)
          now_utc = datetime.now(timezone.utc)
          now_cet = now_utc.astimezone(ZoneInfo("Europe/Berlin"))
          deploy_time = now_cet.strftime('%Y-%m-%d %H:%M:%S %Z')

          def get_release_body(v: str) -> str:
              if not gh_token or not v:
                  return ''
              api_url = f'https://api.github.com/repos/{repo}/releases/tags/v{v}'
              req = urllib.request.Request(
                  api_url,
                  headers={
                      'Authorization': f'Bearer {gh_token}',
                      'Accept': 'application/vnd.github+json',
                      'User-Agent': 'scanorbit-release-bot',
                  },
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      data = json.loads(r.read().decode())
              except Exception:
                  return ''
              body = (data.get('body') or '').strip()
              if len(body) > 2800:
                  body = body[:2800] + '\n...'
              return md_to_telegram_html(body)

          def get_latest_release_body_and_version():
              if not gh_token:
                  return '', ''
              api_url = f'https://api.github.com/repos/{repo}/releases/latest'
              req = urllib.request.Request(
                  api_url,
                  headers={
                      'Authorization': f'Bearer {gh_token}',
                      'Accept': 'application/vnd.github+json',
                      'User-Agent': 'scanorbit-release-bot',
                  },
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      data = json.loads(r.read().decode())
              except Exception:
                  return '', ''
              body = (data.get('body') or '').strip()
              if len(body) > 2800:
                  body = body[:2800] + '\n...'
              body = md_to_telegram_html(body)
              tag = data.get('tag_name') or ''
              if tag.startswith('v'):
                  tag = tag[1:]
              return body, tag

          if new_release == 'true':
              body = get_release_body(version)
              text = (
                  f'🚀 <b>New Release v{escape_html(version or "n/a")}</b>\n\n'
                  f'{body}\n\n'
                  f'Services: {services_line}\n'
                  f'Datetime: {deploy_time}\n'
                  f'By: {escape_html(actor)}\n\n'
                  f'🔗 {server}/{repo}/releases/tag/v{version}'
              )
          else:
              # Fallback: show latest release changelog (if any) plus commit info
              latest_body, latest_version = get_latest_release_body_and_version()

              commit_message = ''
              if gh_token:
                  commit_req = urllib.request.Request(
                      f'https://api.github.com/repos/{repo}/commits/{full_sha}',
                      headers={
                          'Authorization': f'Bearer {gh_token}',
                          'Accept': 'application/vnd.github+json',
                          'User-Agent': 'scanorbit-release-bot',
                      },
                  )
                  try:
                      with urllib.request.urlopen(commit_req) as cr:
                          cdata = json.loads(cr.read().decode())
                      commit_message = cdata.get('commit', {}).get('message', '') or ''
                  except Exception:
                      commit_message = ''

              commit_message_line = commit_message.splitlines()[0] if commit_message else 'n/a'
              commit_message_line = escape_html(commit_message_line)

              header = f'🚀 <b>Release [main]</b>\n\n'
              changelog_part = ''
              if latest_body:
                  title = f'Changelog (latest v{escape_html(latest_version)})\n'
                  changelog_part = f'{title}{latest_body}\n\n'

              text = (
                  header +
                  changelog_part +
                  f'<code>{sha_short}</code>\n'
                  f'Commit: {commit_message_line}\n'
                  f'Services: {services_line}\n'
                  f'Datetime: {deploy_time}\n'
                  f'By: {escape_html(actor)}\n\n'
                  f'🔗 {server}/{repo}/commit/{full_sha}'
              )

          payload_dict = {
              'chat_id': chat_id,
              'text': text,
              'parse_mode': 'HTML',
              'disable_web_page_preview': True,
              'disable_notification': True,
          }

          if thread_id:
              payload_dict['message_thread_id'] = int(thread_id)

          payload = json.dumps(payload_dict).encode()

          req = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=payload,
              headers={'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(req) as r:
              print(r.read().decode())
          EOF