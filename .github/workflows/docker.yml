name: Publish Docker images

on:
  # Fires when semantic-release (via @semantic-release/github) publishes a
  # GitHub release. We pull the version from release.tag_name.
  release:
    types: [published]

  # Manual rebuild — useful for refreshing :latest with security patches
  # without cutting a new semver release. Pass the version you want to
  # rebuild (e.g. "0.1.0"); pre-release versions skip the moving tags.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (without leading v, e.g. 0.1.0)'
        required: true
        type: string

jobs:
  build:
    name: Publish ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            context: .
            dockerfile: apps/api/Dockerfile
            target: production
            build-args: ""
          - name: app
            context: .
            dockerfile: apps/app/Dockerfile
            target: production
            build-args: |
              VITE_PUBLIC_API_URL=/api
          - name: scanner
            context: ./workers
            dockerfile: workers/Dockerfile
            target: scanner
            build-args: ""
          - name: analyzer
            context: ./workers
            dockerfile: workers/Dockerfile
            target: analyzer
            build-args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Strip leading "v" if present (semantic-release default is "v1.2.3")
            RAW="${{ github.event.release.tag_name }}"
            VERSION="${RAW#v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [ -z "$VERSION" ]; then
            echo "::error::Could not resolve a version to build."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Compute image tags
        id: tags
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE: ${{ matrix.image.name }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BASE="ghcr.io/${OWNER}/scanorbit-${IMAGE}"

          # Always tag the exact version.
          {
            echo "tags<<EOF"
            echo "${BASE}:${VERSION}"

            # Moving tags (major, minor, latest) only on stable semver —
            # never on pre-releases like 1.0.0-rc.1.
            if [[ "$VERSION" != *-* ]]; then
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f1-2)
              echo "${BASE}:${MINOR}"
              echo "${BASE}:${MAJOR}"
              echo "${BASE}:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          build-args: ${{ matrix.image.build-args }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=Apache-2.0
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
