name: Deploy Landing to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/landing/**"
      - "packages/eslint-config/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/landing-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing site
        env:
          # Override SITE_URL with the `Pages` configured custom domain or
          # github.io URL. If a CNAME file is committed under apps/landing/public/
          # GitHub Pages will serve from that domain instead.
          SITE_URL: ${{ vars.LANDING_SITE_URL || 'https://maxbolgarin.github.io/scanorbit' }}
        run: pnpm --filter @scanorbit/landing build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
