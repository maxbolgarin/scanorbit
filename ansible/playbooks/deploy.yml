---
# =============================================================================
# ScanOrbit — Full Deployment Playbook
# =============================================================================
# Fully autonomous: creates directories, syncs files, bootstraps secrets/TLS,
# authenticates with GHCR, and starts all services. No manual SSH required.
#
# Usage:
#   cd ansible
#
#   # First deploy (requires secrets file + GHCR credentials):
#   ansible-playbook playbooks/deploy.yml \
#     -e secrets_file=../secrets.env \
#     -e github_username=USER -e github_token=TOKEN
#
#   # Subsequent deploys (secrets already on server):
#   ansible-playbook playbooks/deploy.yml
#
#   # Selective steps:
#   ansible-playbook playbooks/deploy.yml --tags sync         # Sync files only
#   ansible-playbook playbooks/deploy.yml --tags bootstrap    # Bootstrap only
#   ansible-playbook playbooks/deploy.yml --tags services     # Restart services only
#   ansible-playbook playbooks/deploy.yml --tags verify       # Health check only
# =============================================================================

- name: Deploy ScanOrbit
  hosts: app
  become: false
  vars:
    local_deploy_dir: "{{ playbook_dir }}/../../deploy"
    local_env_file: "{{ playbook_dir }}/../../.env.prod"
    secrets_file: ""

  tasks:
    # ─── Prepare server directories ────────────────────────────────────
    - name: Create deploy directory
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        owner: deploy
        group: deploy
        mode: "0755"
      become: true
      tags: [sync, bootstrap]

    # ─── Sync deployment files ─────────────────────────────────────────
    - name: Sync deploy directory to server
      ansible.posix.synchronize:
        src: "{{ local_deploy_dir }}/"
        dest: "{{ deploy_dir }}/"
        use_ssh_args: true
        rsync_opts:
          - "--exclude=secrets/"
          - "--exclude=certs/"
          - "--exclude=.env"
          - "--exclude=*.example"
        delete: false
      tags: [sync]

    - name: Copy .env.prod as .env
      ansible.builtin.copy:
        src: "{{ local_env_file }}"
        dest: "{{ deploy_dir }}/.env"
        mode: "0600"
      when: local_env_file is file
      tags: [sync]

    - name: Set script permissions
      ansible.builtin.shell: |
        chmod +x {{ deploy_dir }}/scripts/*.sh
        chmod +x {{ deploy_dir }}/entrypoints/*.sh
      changed_when: true
      tags: [sync]

    # ─── Bootstrap (secrets, TLS, GHCR, permissions) ──────────────────
    - name: Copy secrets file to server
      ansible.builtin.copy:
        src: "{{ secrets_file }}"
        dest: "{{ deploy_dir }}/secrets.env"
        mode: "0600"
      when: secrets_file | length > 0
      tags: [bootstrap]

    - name: Run bootstrap with secrets
      ansible.builtin.command:
        cmd: ./scripts/bootstrap.sh --secrets secrets.env
        chdir: "{{ deploy_dir }}"
      become: true
      when: secrets_file | length > 0
      tags: [bootstrap]

    - name: Delete secrets file from server
      ansible.builtin.file:
        path: "{{ deploy_dir }}/secrets.env"
        state: absent
      when: secrets_file | length > 0
      tags: [bootstrap]

    - name: Run bootstrap (TLS + permissions)
      ansible.builtin.command:
        cmd: ./scripts/bootstrap.sh --tls
        chdir: "{{ deploy_dir }}"
      become: true
      tags: [bootstrap]

    - name: Read GHCR credentials from secrets file
      ansible.builtin.set_fact:
        github_username: "{{ lookup('file', secrets_file) | regex_search('GITHUB_USERNAME=(.+)', '\\1') | first }}"
        github_token: "{{ lookup('file', secrets_file) | regex_search('GITHUB_TOKEN=(.+)', '\\1') | first }}"
      when: secrets_file | length > 0
      ignore_errors: true
      tags: [bootstrap]

    - name: Authenticate with GHCR
      ansible.builtin.command:
        cmd: ./scripts/bootstrap.sh --github
        chdir: "{{ deploy_dir }}"
      become: true
      environment:
        GITHUB_USERNAME: "{{ github_username }}"
        GITHUB_TOKEN: "{{ github_token }}"
      when: github_username is defined and github_username | length > 0
      tags: [bootstrap]

    # ─── Pull images ─────────────────────────────────────────────────
    - name: Pull latest Docker images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ deploy_dir }}"
      tags: [services]

    # ─── Start services ───────────────────────────────────────────────
    - name: Start infrastructure services (postgres + redis)
      ansible.builtin.command:
        cmd: docker compose up -d postgres redis
        chdir: "{{ deploy_dir }}"
      tags: [services]

    - name: Wait for database to be ready
      ansible.builtin.command:
        cmd: docker compose exec -T postgres pg_isready -U scanorbit
        chdir: "{{ deploy_dir }}"
      register: pg_ready
      retries: 10
      delay: 3
      until: pg_ready.rc == 0
      tags: [services]

    - name: Start all services
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ deploy_dir }}"
      tags: [services]

    - name: Wait for services to stabilize
      ansible.builtin.pause:
        seconds: 15
      tags: [services]

    # ─── Verify ───────────────────────────────────────────────────────
    - name: Check API health
      ansible.builtin.command:
        cmd: docker compose exec -T api wget -qO- http://localhost:4000/health
        chdir: "{{ deploy_dir }}"
      register: api_health
      ignore_errors: true
      tags: [verify]

    - name: Show API health
      ansible.builtin.debug:
        msg: "API health: {{ api_health.stdout | default('UNREACHABLE') }}"
      tags: [verify]

    - name: Show running services
      ansible.builtin.command:
        cmd: docker compose ps --format "table {{ '{{' }}.Name{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}"
        chdir: "{{ deploy_dir }}"
      register: compose_ps
      tags: [verify]

    - name: Display services
      ansible.builtin.debug:
        msg: "{{ compose_ps.stdout_lines }}"
      tags: [verify]
