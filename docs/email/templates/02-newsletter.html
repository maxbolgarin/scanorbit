<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>ScanOrbit</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* === RESET === */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; }

    /* === DARK MODE === */
    @media (prefers-color-scheme: dark) {
      .email-bg { background-color: #111111 !important; }
      .email-body { background-color: #1e1e1e !important; }
      .email-header-bg { background-color: #0f172a !important; }
      .email-text { color: #e0e0e0 !important; }
      .email-heading { color: #f0f0f0 !important; }
      .email-text-muted { color: #888888 !important; }
      .email-link { color: #6db3f2 !important; }
      .email-divider { border-color: #333333 !important; }
      .email-tag-bg { background-color: #1e3a5f !important; }
      .email-tag-text { color: #93c5fd !important; }
    }

    /* === MOBILE === */
    @media only screen and (max-width: 600px) {
      .email-container { width: 100% !important; max-width: 100% !important; }
      .email-padding { padding-left: 24px !important; padding-right: 24px !important; }
      .email-header-padding { padding-left: 24px !important; padding-right: 24px !important; }
    }
  </style>
</head>

<body style="margin: 0; padding: 0; word-spacing: normal; background-color: #f0f1f3;" class="email-bg">
  <div role="article" aria-roledescription="email" lang="en" style="text-size-adjust: 100%; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">

    <!-- VISUALLY HIDDEN PREHEADER -->
    <div style="display: none; font-size: 1px; line-height: 1px; max-height: 0px; max-width: 0px; opacity: 0; overflow: hidden; mso-hide: all;">
      &#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;
    </div>

    <!-- OUTER TABLE -->
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f0f1f3;" class="email-bg">
      <tr>
        <td align="center" style="padding: 40px 16px;">

          <!-- INNER CONTAINER — 600px for newsletter -->
          <table role="presentation" class="email-container" width="600" cellspacing="0" cellpadding="0" border="0" style="margin: 0 auto;">

            <!-- ============================================ -->
            <!-- HEADER BAR -->
            <!-- ============================================ -->
            <tr>
              <td class="email-header-bg email-header-padding" style="background-color: #0f172a; border-radius: 8px 8px 0 0; padding: 24px 40px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <!-- LOGO -->
                    <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px;">
                      ScanOrbit
                    </td>
                    <!-- TAGLINE -->
                    <td align="right" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; color: #94a3b8; letter-spacing: 0.5px; text-transform: uppercase;">
                      AWS Security &middot; Cost &middot; Compliance
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- ============================================ -->
            <!-- BODY -->
            <!-- ============================================ -->
            <tr>
              <td class="email-body email-padding" style="background-color: #ffffff; padding: 40px 40px 16px 40px;">

                <!-- GREETING -->
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; line-height: 24px; color: #52525b; padding-bottom: 8px;" class="email-text-muted">
                      Hey {{ .Subscriber.FirstName }},
                    </td>
                  </tr>
                </table>

                <!-- DIVIDER -->
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="padding: 8px 0 24px 0;">
                      <div style="border-top: 1px solid #e4e4e7; height: 0; font-size: 0; line-height: 0;" class="email-divider">&nbsp;</div>
                    </td>
                  </tr>
                </table>

                <!-- MAIN CONTENT — Listmonk campaign content injected here -->
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; line-height: 26px; color: #27272a;" class="email-text">
                      {{ template "content" . }}
                    </td>
                  </tr>
                </table>

              </td>
            </tr>

            <!-- ============================================ -->
            <!-- SIGN-OFF -->
            <!-- ============================================ -->
            <tr>
              <td class="email-body email-padding" style="background-color: #ffffff; padding: 16px 40px 40px 40px;">
                <!-- DIVIDER -->
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="padding: 0 0 24px 0;">
                      <div style="border-top: 1px solid #e4e4e7; height: 0; font-size: 0; line-height: 0;" class="email-divider">&nbsp;</div>
                    </td>
                  </tr>
                </table>

                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 15px; line-height: 24px; color: #52525b;" class="email-text-muted">
                      Until next time,<br>
                      <span style="color: #27272a; font-weight: 600;" class="email-text">Maksim</span><br>
                      <span style="font-size: 13px;">Founder, ScanOrbit</span>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- ============================================ -->
            <!-- BOTTOM BAR -->
            <!-- ============================================ -->
            <tr>
              <td class="email-header-bg email-padding" style="background-color: #0f172a; border-radius: 0 0 8px 8px; padding: 20px 40px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; line-height: 18px; color: #64748b; text-align: center;">
                      ScanOrbit &middot; Amsterdam, EU &middot; 100% GDPR-compliant
                      <br>
                      <a href="https://scanorbit.cloud" style="color: #94a3b8; text-decoration: none;">scanorbit.cloud</a>
                      &nbsp;&middot;&nbsp;
                      <a href="{{ UnsubscribeURL }}" style="color: #94a3b8; text-decoration: underline;">Unsubscribe</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

          </table>
          <!-- /INNER CONTAINER -->

          <!-- TRACKING PIXEL -->
          {{ TrackView }}

        </td>
      </tr>
    </table>
    <!-- /OUTER TABLE -->

  </div>
</body>
</html>
