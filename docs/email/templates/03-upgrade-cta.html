<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>ScanOrbit</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* === RESET === */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; }

    /* === DARK MODE === */
    @media (prefers-color-scheme: dark) {
      .email-bg { background-color: #1a1a1a !important; }
      .email-body { background-color: #1a1a1a !important; }
      .email-text { color: #e0e0e0 !important; }
      .email-heading { color: #f0f0f0 !important; }
      .email-text-muted { color: #999999 !important; }
      .email-link { color: #6db3f2 !important; }
      .email-btn { background-color: #2563eb !important; }
      .email-btn-text { color: #ffffff !important; }
      .email-divider { border-color: #333333 !important; }
      .email-stats-bg { background-color: #1e293b !important; }
      .email-stats-border { border-color: #334155 !important; }
      .email-stats-label { color: #94a3b8 !important; }
      .email-stats-value { color: #f1f5f9 !important; }
      .email-urgency-bg { background-color: #451a03 !important; }
      .email-urgency-border { border-color: #92400e !important; }
      .email-urgency-text { color: #fbbf24 !important; }
    }

    /* === MOBILE === */
    @media only screen and (max-width: 600px) {
      .email-container { width: 100% !important; max-width: 100% !important; }
      .email-padding { padding-left: 24px !important; padding-right: 24px !important; }
      .email-stats-cell { display: block !important; width: 100% !important; padding: 12px 16px !important; }
      .email-btn-td { padding-left: 0 !important; padding-right: 0 !important; }
    }
  </style>
</head>

<body style="margin: 0; padding: 0; word-spacing: normal; background-color: #f4f4f5;" class="email-bg">
  <div role="article" aria-roledescription="email" lang="en" style="text-size-adjust: 100%; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">

    <!-- VISUALLY HIDDEN PREHEADER -->
    <div style="display: none; font-size: 1px; line-height: 1px; max-height: 0px; max-width: 0px; opacity: 0; overflow: hidden; mso-hide: all;">
      &#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;
    </div>

    <!-- OUTER TABLE -->
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #f4f4f5;" class="email-bg">
      <tr>
        <td align="center" style="padding: 40px 16px;">

          <!-- INNER CONTAINER — 560px for personal feel -->
          <table role="presentation" class="email-container" width="560" cellspacing="0" cellpadding="0" border="0" style="margin: 0 auto;">

            <!-- LOGO -->
            <tr>
              <td class="email-padding" style="padding: 0 0 32px 0;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; color: #18181b; letter-spacing: -0.3px;" class="email-text">
                      ScanOrbit
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- BODY -->
            <tr>
              <td class="email-body email-padding" style="background-color: #ffffff; border-radius: 8px; padding: 40px 40px;">

                <!-- MAIN CONTENT -->
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; line-height: 26px; color: #27272a;" class="email-text">
                      {{ template "content" . }}
                    </td>
                  </tr>
                </table>

                <!--
                  ============================================
                  REUSABLE BLOCKS — copy these into campaign body as needed
                  ============================================
                -->

              </td>
            </tr>

            <!-- FOOTER -->
            <tr>
              <td class="email-padding" style="padding: 32px 0 0 0;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 13px; line-height: 20px; color: #a1a1aa; text-align: center;" class="email-text-muted">
                      ScanOrbit &middot; Amsterdam, EU
                      <br>
                      <a href="{{ UnsubscribeURL }}" style="color: #a1a1aa; text-decoration: underline;" class="email-link">Unsubscribe</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

          </table>

          <!-- TRACKING PIXEL -->
          {{ TrackView }}

        </td>
      </tr>
    </table>

  </div>
</body>
</html>
